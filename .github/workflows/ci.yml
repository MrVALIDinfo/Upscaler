name: ci

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Make wrapper executable
        if: runner.os != 'Windows'
        run: chmod +x mvnw
      - name: Test
        run: ./mvnw -B test
        shell: bash
      - name: Package
        run: ./mvnw -B -DskipTests package
        shell: bash
