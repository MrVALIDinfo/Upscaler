name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Install packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot
      - name: Make scripts executable
        run: chmod +x mvnw scripts/*.sh
      - name: Test
        run: ./mvnw -B test
      - name: Package linux
        run: |
          ./scripts/package-linux.sh
          ./scripts/package-arch.sh
      - name: Upload linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            dist/linux/*
            dist/arch/*

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Install WiX
        shell: powershell
        run: |
          choco install wixtoolset --no-progress -y
          $wix = Get-ChildItem 'C:\Program Files (x86)' -Directory | Where-Object { $_.Name -like 'WiX Toolset*' } | Select-Object -First 1
          if (-not $wix) { throw 'WiX Toolset was not installed.' }
          "$($wix.FullName)\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: Test
        shell: powershell
        run: .\mvnw.cmd -B test
      - name: Package windows
        shell: powershell
        run: .\scripts\package-windows.ps1
      - name: Upload windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: dist/windows/*

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Make scripts executable
        run: chmod +x mvnw scripts/*.sh
      - name: Test
        run: ./mvnw -B test
      - name: Package macos
        run: ./scripts/package-macos.sh
      - name: Upload macos artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: dist/macos/*

  publish:
    runs-on: ubuntu-latest
    needs: [linux, windows, macos]
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/**/*
